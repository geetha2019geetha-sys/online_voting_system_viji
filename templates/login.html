<!DOCTYPE html>
<html>
<head>
    <title>Online Voting Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body{
    margin:0;
    font-family:Arial;
    background-image:url("{{ url_for('static', filename='loginbg.jpg') }}");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    min-height:100vh;

    display:flex;
    justify-content:center;   /* CENTER */
    align-items:center;
    padding:20px;
}

        /* TOP RIGHT MENU BAR */
        .top-menu{
            position:absolute;
            top:20px;
            right:40px;
        }

        /* TRANSPARENT BUTTONS */
        .top-menu a{
            text-decoration:none;
            background:transparent;
            color:white;
            padding:8px 18px;
            margin-left:10px;
            border-radius:20px;
            font-size:14px;
            font-weight:bold;
            border:2px solid white;
            transition:0.3s;
        }

        /* HOVER EFFECT */
        .top-menu a:hover{
            background:white;
            color:#2d6cdf;
        }

        /* LOGIN BOX */
        .login-box{
                 background:rgba(255,255,255,0.2);
                 padding:30px;
                 width:100%;
                 max-width:350px;   /* Important */
                 border-radius:15px;
                 text-align:center;
                 backdrop-filter:blur(8px);
}

        h2{
            margin-bottom:20px;
            color:#000;
        }

        input{
            width:100%;
            padding:10px;
            margin:10px 0;
            border-radius:20px;
            border:1px solid #ccc;
            outline:none;
        }

        button{
            background:#2d6cdf;
            color:white;
            padding:10px 25px;
            border:none;
            border-radius:20px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#1b4fbf;
        }

        /* REGISTER BUTTON */
        .register-btn{
            display:inline-block;
            margin-top:10px;
            text-decoration:none;
            background:green;
            color:white;
            padding:8px 20px;
            border-radius:20px;
        }

        .register-btn:hover{
            background:darkgreen;
        }

        @media (max-width: 768px){

    body{
        justify-content:center;
        align-items:center;
        padding:15px;
    }

    .login-box{
        padding:25px;
    }

    .top-menu{
        position:static;
        width:100%;
        justify-content:center;
        margin-bottom:15px;
    }

    .top-menu a{
        margin:5px;
        font-size:12px;
        padding:6px 12px;
    }

    h2{
        font-size:18px;
    }

    input{
        padding:12px;
    }

    button{
        width:100%;   /* full width button */
    }

    .register-btn{
        width:100%;
        display:block;
    }
}

button:active,
.register-btn:active{
    transform:scale(0.97);
}
    </style>
</head>

<body>

    <!-- TOP RIGHT BUTTONS -->
    <div class="top-menu">
        <a href="/">Home</a>
        <a href="/service">Service</a>
        <a href="/manifesto">Party Manifesto</a>
        <a href="/about">About</a>
    </div>

    <!-- LOGIN BOX -->
    <div class="login-box">
        <h2>Enter Voter Card Number</h2>

        <form method="POST">
            <label>Voter ID:</label><br>
            <input type="text" name="username" required><br>

            <label>Password:</label><br>
            <input type="password" name="password" required><br><br>

            <button type="submit">Login</button>
        </form>

        <br>
        <p>Admin login</p>

        <!-- REGISTER BUTTON -->
        <a href="/register" class="register-btn">Register</a>
    </div>

</body>
</html>
