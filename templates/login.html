<!DOCTYPE html>
<html>
<head>
    <title>Online Voting Login</title>
    <style>
        body{
            margin:0;
            font-family:Arial;
            /* BACKGROUND IMAGE */
            background-image:url("{{ url_for('static', filename='loginbg.jpg') }}");
            background-size:cover;
            background-position:center;
            background-repeat:no-repeat;
            height:100vh;
            display:flex;
            justify-content:flex-end;
            align-items:center;
            padding-right:80px;
        }

        /* TOP RIGHT MENU BAR */
        .top-menu{
            position:absolute;
            top:20px;
            right:40px;
        }

        /* TRANSPARENT BUTTONS */
        .top-menu a{
            text-decoration:none;
            background:transparent;
            color:white;
            padding:8px 18px;
            margin-left:10px;
            border-radius:20px;
            font-size:14px;
            font-weight:bold;
            border:2px solid white;
            transition:0.3s;
        }

        /* HOVER EFFECT */
        .top-menu a:hover{
            background:white;
            color:#2d6cdf;
        }

        /* LOGIN BOX */
        .login-box{
            background:rgba(255,255,255,0.2);
            padding:40px;
            width:350px;
            border-radius:15px;
            text-align:center;
            backdrop-filter:blur(6px);
        }

        h2{
            margin-bottom:20px;
            color:#000;
        }

        input{
            width:100%;
            padding:10px;
            margin:10px 0;
            border-radius:20px;
            border:1px solid #ccc;
            outline:none;
        }

        button{
            background:#2d6cdf;
            color:white;
            padding:10px 25px;
            border:none;
            border-radius:20px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#1b4fbf;
        }

        /* REGISTER BUTTON */
        .register-btn{
            display:inline-block;
            margin-top:10px;
            text-decoration:none;
            background:green;
            color:white;
            padding:8px 20px;
            border-radius:20px;
        }

        .register-btn:hover{
            background:darkgreen;
        }

    </style>
</head>

<body>

    <!-- TOP RIGHT BUTTONS -->
    <div class="top-menu">
        <a href="/">Home</a>
        <a href="/service">Service</a>
        <a href="/manifesto">Party Manifesto</a>
        <a href="/about">About</a>
    </div>

    <!-- LOGIN BOX -->
    <div class="login-box">
        <h2>Enter Voter Card Number</h2>

        <form method="POST">
            <label>Voter ID:</label><br>
            <input type="text" name="username" required><br>

            <label>Password:</label><br>
            <input type="password" name="password" required><br><br>

            <button type="submit">Login</button>
        </form>

        <br>
        <p>Admin login</p>

        <!-- REGISTER BUTTON -->
        <a href="/register" class="register-btn">Register</a>
    </div>

</body>
</html>
