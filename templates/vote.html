<!DOCTYPE html>
<html>
<head>
<title>Cast Your Vote</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial;

    background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
    url("{{ url_for('static', filename='votebg.jpg') }}");
    background-size:cover;
    background-position:center;
    min-height:100vh;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

.page-title{
    font-size:42px;
    font-weight:bold;
    color:white;
    margin-bottom:40px;
    background:rgba(0,0,0,0.4);
    padding:15px 40px;
    border-radius:20px;
    backdrop-filter:blur(6px);
}

.party-row{
    display:flex;
    gap:30px;
    flex-wrap:wrap;
    justify-content:center;
}

.party-card{
    background:rgba(255,255,255,0.95);
    padding:20px;
    border-radius:20px;
    width:160px;
    text-align:center;
    box-shadow:0 5px 20px rgba(0,0,0,0.4);
    transition:0.3s;
    cursor:pointer;
}

.party-card:hover{
    transform:scale(1.08);
    background:#f1f5ff;
}

.party-card img{
    width:100px;
    height:100px;
    object-fit:contain;
    margin-bottom:10px;
}

.party-card label{
    font-size:18px;
    font-weight:bold;
    display:block;
    margin-bottom:10px;
}

.party-card input{
    transform:scale(1.5);
    cursor:pointer;
}

button{
    margin-top:40px;
    padding:15px 60px;
    font-size:20px;
    border:none;
    border-radius:30px;
    background:#28a745;
    color:white;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#1e7e34;
}
</style>
</head>

<body>

<div class="page-title">
    🗳️ Cast Your Vote
</div>

<form method="POST">

<div class="party-row">

    <!-- DMK -->
    <div class="party-card">
        <img src="{{ url_for('static', filename='dmk.png') }}">
        <label>DMK</label>
        <input type="radio" name="party" value="DMK" required>
    </div>

    <!-- AIADMK -->
    <div class="party-card">
        <img src="{{ url_for('static', filename='aiadmk.png') }}">
        <label>AIADMK</label>
        <input type="radio" name="party" value="ADMK">
    </div>

    <!-- BJP -->
    <div class="party-card">
        <img src="{{ url_for('static', filename='bjp.png') }}">
        <label>BJP</label>
        <input type="radio" name="party" value="BJP">
    </div>

    <!-- Congress -->
    <div class="party-card">
        <img src="{{ url_for('static', filename='congress.png') }}">
        <label>Congress</label>
        <input type="radio" name="party" value="Congress">
    </div>

    <!-- NTK -->
    <div class="party-card">
        <img src="{{ url_for('static', filename='ntk.png') }}">
        <label>NTK</label>
        <input type="radio" name="party" value="NTk">
    </div>

    <!-- TVK -->
    <div class="party-card">
        <img src="{{ url_for('static', filename='tvk.png') }}">
        <label>TVK</label>
        <input type="radio" name="party" value="TVK">
    </div>

    <!-- PMK -->
    <div class="party-card">
        <img src="{{ url_for('static', filename='pmk.png') }}">
        <label>PMK</label>
        <input type="radio" name="party" value="PMK">
    </div>

</div>

<div style="text-align:center;">
    <button type="submit">Submit Vote</button>
</div>

</form>

</body>
</html>
