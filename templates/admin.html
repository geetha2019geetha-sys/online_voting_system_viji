<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body{
    font-family: Arial;
    background: linear-gradient(to right, #002147, #003366);

    display:flex;
    justify-content:center;
    align-items:center;

    min-height:100vh;   /* better than height */
    margin:0;
    padding:15px;       /* important for mobile */
}
        .login-box{
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 5px 20px rgba(0,0,0,0.3);
            text-align:center;
            width:100%;
            max-width:350px;
        }

        h2{
            margin-bottom:25px;
            color:#002147;
        }

        input{
            width:100%;
            padding:14px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:15px;
        }

        input:focus{
            border-color:#002147;
            outline:none;
        }

        button{
            width:100%;
            padding:14px;
            background:#002147;
            color:white;
            border:none;
            border-radius:8px;
            cursor:pointer;
            font-size:16px;
            margin-top:10px;
        }

        button:hover{
            background:#004080;
        }

        .back-link{
            margin-top:15px;
            display:block;
            text-decoration:none;
            color:#002147;
            font-size:14px;
        }

        .back-link:hover{
            text-decoration:underline;
        }

        @media (max-width: 768px){

    .login-box{
        padding:25px;
    }

    h2{
        font-size:20px;
    }

    input{
        padding:12px;
        font-size:14px;
    }

    button{
        padding:12px;
        font-size:15px;
    }

    .back-link{
        font-size:13px;
    }
}

button:active{
    transform:scale(0.97);
}

    </style>
</head>

<body>

<div class="login-box">
    <h2>Admin Result Login</h2>

    <form method="POST">
        <input type="text" name="username" placeholder="Admin Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <a href="/" class="back-link">← Back to Home</a>
</div>

</body>
</html>
