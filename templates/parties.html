<!DOCTYPE html>
<html>
<head>
    <title>{{ name }} Parties</title>

    <style>
        body{
            font-family: Arial;
            background:#f4f6f9;
            margin:0;
        }

        .header{
            background:#003366;
            color:white;
            padding:15px;
            text-align:center;
        }

        .container{
            display:grid;
            grid-template-columns: repeat(auto-fill, minmax(200px,1fr));
            gap:20px;
            padding:30px;
        }

        .party-card{
            background:white;
            padding:15px;
            text-align:center;
            border-radius:8px;
            box-shadow:0 2px 6px rgba(0,0,0,0.1);
            transition:0.3s;
        }

        .party-card:hover{
            transform:scale(1.05);
        }

        .party-card img{
            width:120px;
        }

        .back{
            text-align:center;
            margin-bottom:20px;
        }

        .back a{
            background:#003366;
            color:white;
            padding:8px 15px;
            text-decoration:none;
            border-radius:5px;
        }
    </style>
</head>

<body>

<div class="header">
    <h2>{{ name }} - Party Participants</h2>
</div>

<div class="back">
    <a href="{{ url_for('constituency') }}">⬅ Back</a>
</div>

<div class="container">

    {% for p in parties %}
        <div class="party-card">
            <img src="{{ url_for('static', filename=p) }}">
        </div>
    {% endfor %}

</div>

</body>
</html>
